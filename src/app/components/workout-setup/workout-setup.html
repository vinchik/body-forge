<section class="setup" aria-labelledby="setup-title">
  <header class="setup__header">
    <p class="setup__eyebrow">Tabata · HIIT</p>
    <h1 id="setup-title" class="setup__title">Core Forge</h1>
    <p class="setup__subtitle">Configure your session and ignite the burn.</p>
  </header>

  <form class="setup__form" (submit)="$event.preventDefault(); start()">
    <div class="field">
      <div class="field__row">
        <label class="field__label" for="exercise-count">Exercises</label>
        <span class="field__value">{{ exerciseCount() }}</span>
      </div>
      <input
        id="exercise-count"
        class="slider slider--blue"
        type="range"
        [min]="minExercises"
        [max]="maxExercises"
        step="1"
        [value]="exerciseCount()"
        (input)="onExerciseCount($any($event.target).value)"
        [attr.aria-valuetext]="exerciseCount() + ' exercises'"
      />
      <div class="field__scale">
        <span>{{ minExercises }}</span>
        <span>{{ maxExercises }}</span>
      </div>
    </div>

    <div class="field">
      <div class="field__row">
        <label class="field__label" for="work-seconds">Work period</label>
        <span class="field__value field__value--work">{{ workSeconds() }}s</span>
      </div>
      <input
        id="work-seconds"
        class="slider slider--work"
        type="range"
        [min]="minWork"
        [max]="maxWork"
        step="5"
        [value]="workSeconds()"
        (input)="onWorkSeconds($any($event.target).value)"
        [attr.aria-valuetext]="workSeconds() + ' seconds of work'"
      />
      <div class="field__scale">
        <span>{{ minWork }}s</span>
        <span>{{ maxWork }}s</span>
      </div>
    </div>

    <div class="field">
      <div class="field__row">
        <label class="field__label" for="rest-seconds">Rest period</label>
        <span class="field__value field__value--rest">{{ restSeconds() }}s</span>
      </div>
      <input
        id="rest-seconds"
        class="slider slider--rest"
        type="range"
        [min]="minRest"
        [max]="maxRest"
        step="5"
        [value]="restSeconds()"
        (input)="onRestSeconds($any($event.target).value)"
        [attr.aria-valuetext]="restSeconds() + ' seconds of rest'"
      />
      <div class="field__scale">
        <span>{{ minRest }}s</span>
        <span>{{ maxRest }}s</span>
      </div>
    </div>

    <button class="start-button" type="submit">
      <span class="start-button__label">Start Workout</span>
      <span class="start-button__glow" aria-hidden="true"></span>
    </button>
  </form>
</section>
